[project]
name = "idash-schemas"
version = "0.0.0"
description = "idash Pydantic schemas (API / batch I/O DTOs)."
requires-python = ">=3.13"
dependencies = [
    "pydantic",
]

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "schemas"
module-root = "src"

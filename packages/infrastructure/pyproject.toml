[project]
name = "idash-infrastructure"
version = "0.0.0"
description = "idash infrastructure layer (concrete adapters implementing domain ports)."
requires-python = ">=3.13"
dependencies = [
    "idash-domain",
    "idash-common",
]

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "infrastructure"
module-root = "src"

[tool.uv.sources]
idash-domain = { workspace = true }
idash-common = { workspace = true }

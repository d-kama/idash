[project]
name = "idash-common"
version = "0.0.0"
description = "idash common utilities (config / Parameter Store / logging)."
requires-python = ">=3.13"
dependencies = [
    "boto3",
]

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "common"
module-root = "src"

version: '3'

# Phase 0 では「いま動くタスク」のみ実装する。
# 将来タスク（gen-types / build-front / batch / bff / front）は
# 該当アプリの実装が入る後続フェーズで有効化する（下部にコメントで雛形を残置）。

tasks:
  setup:
    desc: 依存解決（Python uv + TS pnpm）
    cmds:
      - uv sync
      - pnpm install

  setup:ci:
    desc: "CI 用の依存解決（frozen install。古い lockfile を検知して落とす）"
    cmds:
      - uv sync --frozen
      - pnpm install --frozen-lockfile

  lint:
    desc: "Lint（Python: ruff / TS: Biome）"
    cmds:
      - uv run ruff check .
      - pnpm exec biome lint .

  format:
    desc: "フォーマット（Python: ruff format / TS: Biome）"
    cmds:
      - uv run ruff format .
      - pnpm exec biome format --write .

  typecheck:
    desc: "型チェック（Python: ty / TS: tsc）"
    cmds:
      - uv run ty check
      - pnpm -r run typecheck

  test:
    desc: "テスト（pytest + infra Vitest）"
    cmds:
      - uv run pytest
      - pnpm --filter @idash/infra test

  synth:
    desc: "CDK synth（CloudFormation テンプレート生成。AWS 認証不要）"
    cmds:
      - pnpm --filter @idash/infra exec cdk synth

  deploy:
    desc: "CDK デプロイ（要 AWS 認証。対象は現状 IdashBatchStack のみ）"
    cmds:
      - pnpm --filter @idash/infra exec cdk deploy --all --require-approval never

  check:
    desc: lint + typecheck + test を一括実行
    cmds:
      - task: lint
      - task: typecheck
      - task: test


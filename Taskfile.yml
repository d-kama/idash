version: '3'

# 横断タスクを go-task に集約する。個別言語ツールを直接叩く必要は基本ない。

tasks:
  setup:
    desc: 依存解決（Python uv + TS pnpm）
    cmds:
      - uv sync
      - pnpm install

  setup:ci:
    desc: "CI 用の依存解決（frozen install。古い lockfile を検知して落とす）"
    cmds:
      - uv sync --frozen
      - pnpm install --frozen-lockfile

  lint:
    desc: "Lint（Python: ruff / TS: Biome）"
    cmds:
      - uv run ruff check .
      - pnpm exec biome lint .

  format:
    desc: "フォーマット自動修正（書き込み・ローカル整形。Python: ruff format / TS: Biome）"
    cmds:
      - uv run ruff format .
      - pnpm exec biome format --write .

  gen-types:
    desc: "Pydantic → OpenAPI → TS 型を生成（生成物は非コミット。frontend が import）"
    cmds:
      # export_openapi は bff.main を import して app.openapi() を出力するだけ（DB/env 不要）。
      - uv run python -m bff.export_openapi > apps/frontend/openapi.json
      # --filter で frontend ディレクトリ基準に実行（openapi.json / 出力先とも相対）。
      - pnpm --filter @idash/frontend exec openapi-typescript openapi.json -o src/api/generated/schema.d.ts

  typecheck:
    desc: "型チェック（Python: ty / TS: tsc）"
    # frontend の tsc は生成型（schema.d.ts）に依存するため先に生成する（非コミットのため
    # クリーン環境でも通す）。Python 側の ty は生成型に依存しないが、まとめて gen-types 後に走らせる。
    deps: [gen-types]
    cmds:
      - uv run ty check
      - pnpm -r run typecheck

  test:
    desc: "テスト（pytest + infra/frontend Vitest）"
    cmds:
      - uv run pytest
      - pnpm --filter @idash/infra test
      - pnpm --filter @idash/frontend test

  build-front:
    desc: "フロントエンドをビルド（生成型で tsc + vite build。IdashFrontendStack の dist 元）"
    deps: [gen-types]
    cmds:
      - pnpm --filter @idash/frontend run build

  synth:
    desc: "CDK synth（CloudFormation テンプレート生成。AWS 認証不要）"
    # IdashFrontendStack の Source.asset('apps/frontend/dist') が synth 時に dist を要求する。
    deps: [build-front]
    cmds:
      - pnpm --filter @idash/infra exec cdk synth

  bff:
    desc: "BFF をローカル起動（uvicorn。/api/visualization を http://localhost:8000 で提供）"
    env:
      ENV_NAME: local
      DATA_LOCATION: '{{.DATA_LOCATION | default "data/assets.parquet"}}'
      # origin-verify は fail-closed（未設定はエラー）。ローカルは明示 opt-out で検証を無効化する。
      ORIGIN_VERIFY_DISABLED: "1"
    cmds:
      - uv run uvicorn bff.main:app --reload --port 8000

  front:
    desc: "フロントエンドをローカル起動（vite dev。/api は task bff へプロキシ）"
    cmds:
      - pnpm --filter @idash/frontend exec vite

  deploy:
    desc: "CDK デプロイ（要 AWS 認証。build-front 後に全スタックを配備）"
    deps: [build-front]
    cmds:
      - pnpm --filter @idash/infra exec cdk deploy --all --require-approval never

  check:
    desc: "CI と同じ検証（書き換えなし）: lint + フォーマット検証 + typecheck + test"
    cmds:
      - uv run ruff check .            # Python: Lint
      - uv run ruff format --check .   # Python: フォーマット検証
      - pnpm exec biome ci .           # TS: Lint + フォーマット + import 整列 を一括検証（CI 専用コマンド）
      - task: typecheck
      - task: test
